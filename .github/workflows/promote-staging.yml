name: Promote to Staging

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type PROMOTE to confirm'
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        if: ${{ github.event.inputs.confirm != 'PROMOTE' }}
        run: |
          echo "You must type PROMOTE to confirm."
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push dev main to staging main
        run: |
          git remote add staging https://x-access-token:${{ secrets.STAGING_REPO_TOKEN }}@github.com/mohsinqreshii/center3-staging.git
          git push staging main --force
